# VRAE 학습 하이퍼파라미터 (Mini 모델용 - 빠른 실험)

# 옵티마이저 설정
learning_rate: 0.001       # 작은 모델이므로 normal LR

# 학습률 스케줄러
use_lr_scheduler: true
lr_decay_rate: 0.98

batch_size: 8              # 매우 작음 (작은 모델용)

# 학습 에포크
epochs: 300                # 충분히 길게 (패턴 학습용)
log_interval: 50
save_interval: 10
checkpoint_dir: ./checkpoints

# KL Annealing (압축 강제)
kl_annealing_end: 80       # 천천히
kl_start_weight: 0.3       # 초기부터 강함
kl_end_weight: 1.2         # 끝에 매우 강함 (압축 강제)

# 조기 종료
early_stopping_patience: 10      # 작은 모델이므로 더 오래 기다림
early_stopping_min_delta: 0.0001 # 미세한 개선도 인정

# 손실 함수 가중치
w_vae: 0.5                 # VAE 강조
w_action: 2.0              # Action 강조
w_transition: 1.0
w_rollout: 0.5

# WANDB
use_wandb: true
