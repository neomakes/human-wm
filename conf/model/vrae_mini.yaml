# VRAE Mini Model Configuration
# 목표: VAE 압축 강제 + 정보병목 명확화

# 모델 이름
name: vrae

# 데이터 차원
action_dim: 7        # 행동
state_dim: 2         # 상태
context_dim: 1       # 컨텍스트

# 극도로 축소된 잠재 차원 (정보 병목 강제)
latent_state_dim: 4        # z_a: 75% 축소
latent_policy_dim: 8       # z_b: 75% 축소
latent_transition_dim: 8   # z_c: 75% 축소
# 총 잠재 차원: 4 + 8 + 8 = 20 (기존 96에서 79% 축소)

# 극도로 축소된 네트워크
hidden_dim: 32             # 256에서 87% 축소 (정보 병목)
num_layers: 1              # 1층으로 단순화
dropout_rate: 0.05         # 낮게 (작은 모델이므로)

# 거리 메트릭
distance_type: "huber"
huber_delta: 1.0

# 샘플링 파라미터 (유지)
k_a: 3
k_b: 3
k_c: 3

# 손실함수 가중치 (강화된 버전)
w_vae: 0.5            # VAE 강조 (압축 강제)
w_action: 2.0         # Action 강조
w_transition: 1.0
w_rollout: 0.5
